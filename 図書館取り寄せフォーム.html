<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SVG Form Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@400;600&display=swap" rel="stylesheet">

    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: #f3f4f6;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }
      h1 {
        font-size: 1.5rem;
        font-weight: bold;
        margin: 1rem 0;
        color: #1f2937;
      }
      #editor-container {
        background-color: white;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        padding: 0;
        margin-bottom: 1rem;
        width: 100%;
        max-width: 1000px; /* Increased from implicit/wrapper constraint */
      }
      p {
        margin: 0 0 1rem 0;
        font-size: 0.875rem;
        color: #6b7280;
        padding: 0 1rem;
        text-align: center;
      }
      /* Floating Button Styles */
      .floating-btn {
        position: fixed;
        bottom: 30px;
        margin: 0;
        padding: 12px 24px;
        color: white;
        border: none;
        border-radius: 9999px;
        cursor: pointer;
        font-size: 16px;
        font-weight: 600;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: all 0.2s;
        z-index: 50;
      }
      .floating-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      }
      
      .btn-print {
        background-color: #2563eb;
        right: 30px;
      }
      .btn-print:hover {
        background-color: #1d4ed8;
      }

      .btn-bookmarklet {
        background-color: #059669;
        right: 180px;
      }
      .btn-bookmarklet:hover {
        background-color: #047857;
      }

      /* Modal Styles */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        display: none; /* Hidden by default */
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }
      .modal-content {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 500px;
        width: 90%;
        text-align: center;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
      }
      .bookmarklet-link {
        display: inline-block;
        background: #2563eb;
        color: white;
        padding: 12px 24px;
        border-radius: 9999px;
        text-decoration: none;
        font-weight: bold;
        margin: 1.5rem 0;
        cursor: grab;
        border: 2px dashed #93c5fd;
      }
      .bookmarklet-link:active {
        cursor: grabbing;
      }
      .close-modal {
        margin-top: 1rem;
        background: transparent;
        border: 1px solid #d1d5db;
        color: #374151;
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.875rem;
      }
      .close-modal:hover {
        background-color: #f3f4f6;
      }
      
      /* Custom Radio Button Styles */
      input[type="radio"] {
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        background-color: rgba(255, 255, 255, 0.3);
        border: none; /* Removed border */
        cursor: pointer;
        display: block;
      }
      
      input[type="radio"]:hover {
        /* background-color: rgba(255, 255, 255, 0.5); */
        /* border-color: rgba(0, 100, 255, 0.8); */
      }

      input[type="radio"]:checked {
        background-image: linear-gradient(to top right, transparent calc(50% - 1px), black calc(50% - 1px), black calc(50% + 1px), transparent calc(50% + 1px));
      }
      
      @media print {
        @page {
          margin: 0;
          size: auto;
        }
        body {
          background-color: white;
          padding: 0;
          margin: 0;
          display: flex;
          justify-content: center;
          align-items: flex-start;
          height: 100vh;
          width: 100vw;
          overflow: hidden;
        }
        h1, p, .no-print {
          display: none !important;
        }
        #editor-container {
          box-shadow: none;
          padding: 0;
          margin: 0;
          width: 100% !important;
          height: 100% !important;
          max-width: none !important;
          display: flex;
          justify-content: center;
          align-items: flex-start;
        }
        
        /* Wrapper needs to fit the page */
        #editor-container > div {
           width: 100% !important;
           height: auto !important;
           max-height: 100vh !important;
           /* Maintain aspect ratio and fit within page */
           object-fit: contain; 
        }

        /* Ensure inputs look clean in print */
        textarea, input {
          background-color: transparent !important;
          border: none !important; 
          overflow: hidden !important; /* Prevent scrollbars */
          white-space: pre-wrap !important; /* Ensure wrapping */
          word-break: break-word !important; /* Break long words */
          resize: none !important;
          box-shadow: none !important;
          outline: none !important;
        }
        
        /* Force font size to be slightly smaller in print to avoid overflow if browser rendering differs */
        textarea {
           overflow: hidden;
        }
        
        /* Specific print styles for radio buttons */
        input[type="radio"]:checked {
          background-image: linear-gradient(to top right, transparent calc(50% - 1px), black calc(50% - 1px), black calc(50% + 1px), transparent calc(50% + 1px)) !important;
          -webkit-print-color-adjust: exact;
          print-color-adjust: exact;
        }
      }
    </style>
  </head>

    <div id="editor-container"></div>
    
    <!-- Bookmarklet Modal -->
    <div id="bookmarklet-modal" class="modal-overlay">
      <div class="modal-content">
        <h3 style="margin-top: 0; color: #1f2937;">ブックマークレットの作成</h3>
        <p style="color: #4b5563; margin-bottom: 1rem;">
          以下のボタンをブラウザのブックマークバーに<br>ドラッグ＆ドロップしてください。
        </p>
        
        <a id="bookmarklet-anchor" href="#" class="bookmarklet-link" onclick="return false;">
          📖 書籍情報入力
        </a>
        
        <p style="font-size: 0.875rem; color: #6b7280; margin-bottom: 1.5rem;">
          Amazonなどの書籍ページでこのブックマークをクリックすると、<br>書名・著者名などが自動的にこのフォームに入力されます。
        </p>
        
        <button class="close-modal" onclick="document.getElementById('bookmarklet-modal').style.display='none'">閉じる</button>
      </div>
    </div>

      function initEditor(container) {
        // Clear container
        container.innerHTML = '';
        
        // Create wrapper for relative positioning
        const wrapper = document.createElement('div');
        wrapper.style.position = 'relative';
        wrapper.style.display = 'block';
        wrapper.style.width = '100%';
        wrapper.style.maxWidth = '100%'; // Allow it to fill the larger container
        wrapper.style.margin = '0 auto'; // Center it
        // Removed border and shadow to reduce visual noise/whitespace
        container.appendChild(wrapper);

        // Inject SVG
        wrapper.innerHTML = svgContent;
        const svgElement = wrapper.querySelector('svg');
        if (!svgElement) return;

        // Ensure SVG has display block to avoid extra space
        svgElement.style.display = 'block';
        svgElement.style.width = '100%';
        svgElement.style.height = 'auto';

        // Find all groups that are NOT the background image
        const groups = Array.from(svgElement.querySelectorAll('g'));
        const textGroups = groups.filter(g => !g.querySelector('use'));

        const inputs = [];

        // Create inputs for each text group
        textGroups.forEach((g) => {
          // Get bounding box
          const rect = g.getBoundingClientRect();
          const svgRect = svgElement.getBoundingClientRect();

          // Calculate percentages for responsiveness
          const topPct = ((rect.top - svgRect.top) / svgRect.height) * 100;
          const leftPct = ((rect.left - svgRect.left) / svgRect.width) * 100;
          const widthPct = (rect.width / svgRect.width) * 100;
          const heightPct = (rect.height / svgRect.height) * 100;

          // Create input
          
          // Check if it's a small box (likely radio button)
          // Original small radios are ~2.4% width.
          // The three larger boxes user wants as radios are ~4.8% width.
          const isRadio = widthPct < 3.0 || (widthPct > 4.6 && widthPct < 5.2);
          
          // Check if it's a digit box (width around 4.35%)
          // We need to exclude the 4.8% boxes which are now radios.
          const isDigit = widthPct >= 3.0 && widthPct <= 4.6;
          
          // Check if it's the specific box user wants to circle (width ~29.3%)
          // Based on the screenshot, it's the box in the middle row, left side.
          // Let's identify it by width and position if possible, or just width.
          // The screenshot highlights a box that looks like a date or year field.
          // Its width is likely around 29% based on visual comparison with the full width lines.
          // Let's check the widthPct of that specific box.
          // The box in the screenshot is the one with "fdsaふぁ" in previous screenshots.
          // It's the third row of inputs, left side.
          // Let's use a class for it.
          const isCircleInput = widthPct > 28.0 && widthPct < 30.0;

          if (isRadio) {
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `radio-pending-${Math.random()}`; // Temp name
            input.style.cursor = 'pointer';
            
            // Fill the box completely
            input.style.margin = '0';
            input.style.position = 'absolute';
            input.style.top = `${topPct}%`;
            input.style.left = `${leftPct}%`;
            input.style.width = `${widthPct}%`;
            input.style.height = `${heightPct}%`;
            
            inputs.push(input);
          } else if (isDigit) {
            const input = document.createElement('input');
            input.type = 'text';
            input.inputMode = 'numeric';
            input.maxLength = 1;
            input.className = 'digit-input'; // Mark for navigation
            input.dataset.heightPct = heightPct; // Store height percentage
            input.style.position = 'absolute';
            input.style.top = `${topPct}%`;
            input.style.left = `${leftPct}%`;
            input.style.width = `${widthPct}%`;
            input.style.height = `${heightPct}%`;
            input.style.border = 'none'; // No border
            input.style.backgroundColor = 'transparent';
            input.style.textAlign = 'center';
            // input.style.fontSize = '16px'; // Removed fixed size
            input.style.padding = '0';
            input.style.boxSizing = 'border-box';
            input.style.fontFamily = '"Klee One", cursive';
            input.style.fontWeight = '600'; // Make it slightly bolder for readability
            input.style.color = '#000000';
            
            // Hover/Focus effects
            input.addEventListener('mouseenter', () => {
              // input.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
            });
            input.addEventListener('mouseleave', () => {
              if (document.activeElement !== input) {
                // input.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
              }
            });
            input.addEventListener('focus', () => {
              input.style.backgroundColor = 'transparent';
              // input.style.outline = '2px solid #2563eb'; // Removed outline
              input.style.outline = 'none';
              input.style.zIndex = '10';
              input.select(); // Auto-select content on focus
            });
            input.addEventListener('blur', () => {
              input.style.backgroundColor = 'transparent';
              input.style.outline = 'none';
              input.style.zIndex = 'auto';
            });

            inputs.push(input);
          } else {
            // Use textarea for text inputs to allow multi-line and auto-sizing
            const textarea = document.createElement('textarea');
            textarea.className = 'auto-resize-textarea'; // Add class for global resize handler
            textarea.style.position = 'absolute';
            textarea.style.top = `${topPct}%`;
            textarea.style.left = `${leftPct}%`;
            textarea.style.width = `${widthPct}%`;
            textarea.style.height = `${heightPct}%`;
            textarea.style.border = 'none'; // No border
            textarea.style.backgroundColor = 'transparent';
            textarea.style.padding = '0';
            textarea.style.margin = '0';
            textarea.style.boxSizing = 'border-box';
            textarea.style.fontFamily = '"Klee One", cursive';
            textarea.style.fontWeight = '600'; // Make it slightly bolder for readability
            textarea.style.color = '#000000';
            textarea.style.resize = 'none';
            textarea.style.overflow = 'hidden';
            textarea.style.whiteSpace = 'pre-wrap';
            textarea.style.wordBreak = 'break-word';
            textarea.style.lineHeight = '1'; // Tight line height for maximum filling
            
            if (isCircleInput) {
               // Add a circle around the text
               textarea.style.borderRadius = '50%';
               textarea.style.border = '2px solid black'; // Keep this specific border
               textarea.style.textAlign = 'center';
               // Center text vertically
               textarea.style.display = 'flex';
               textarea.style.alignItems = 'center';
               textarea.style.justifyContent = 'center';
               textarea.style.paddingTop = '2%'; // Approximate vertical centering
            }

            // Auto-size logic
            const autoSize = () => {
              if (textarea.clientHeight === 0) return;
              const minFontSize = 8;
              const maxFontSize = Math.floor(textarea.clientHeight * 0.95); // Use 95% to be safe but maximize fill
              
              let min = minFontSize;
              let max = maxFontSize;
              let bestFit = minFontSize;

              // Binary search for the best font size
              while (min <= max) {
                const mid = Math.floor((min + max) / 2);
                textarea.style.fontSize = `${mid}px`;
                
                // Check overflow
                // We accept if scrollHeight is within a small tolerance of clientHeight (to account for sub-pixel issues)
                // and scrollWidth is not significantly larger than clientWidth
                if (textarea.scrollHeight <= textarea.clientHeight + 1 && textarea.scrollWidth <= textarea.clientWidth + 1) {
                  bestFit = mid;
                  min = mid + 1;
                } else {
                  max = mid - 1;
                }
              }
              
              textarea.style.fontSize = `${bestFit}px`;
            };

            // Trigger auto-size on input
            textarea.addEventListener('input', autoSize);
            textarea.autoSize = autoSize; // Expose for external calls
            
            // Initial sizing (needs to happen after append, or we can just set a default and wait for focus/input)
            // But we want it to look right if there was default text. Here it's empty.
            // We'll call it after appending.

            // Add hover/focus effects
            textarea.addEventListener('mouseenter', () => {
              // textarea.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
            });
            textarea.addEventListener('mouseleave', () => {
              if (document.activeElement !== textarea) {
                // textarea.style.backgroundColor = 'rgba(255, 255, 255, 0.5)';
                if (isCircleInput) textarea.style.border = '2px solid black';
              }
            });
            textarea.addEventListener('focus', () => {
              textarea.style.backgroundColor = 'transparent';
              // textarea.style.outline = '2px solid #2563eb'; // Use outline
              textarea.style.outline = 'none';
              textarea.style.zIndex = '10';
              autoSize(); // Ensure size is correct on focus
            });
            textarea.addEventListener('blur', () => {
              textarea.style.backgroundColor = 'transparent';
              textarea.style.outline = 'none';
              if (isCircleInput) textarea.style.border = '2px solid black';
              textarea.style.zIndex = 'auto';
            });

            inputs.push(textarea);
          }

          // Hide the original group
          g.style.opacity = '0.1'; 
          g.style.display = 'none';
        });

        // Grouping logic
        const radios = inputs.filter(i => i.type === 'radio');
        const processed = new Set();

        // 1. Horizontal grouping (Same Row)
        radios.forEach(r1 => {
           if (processed.has(r1)) return;
           const r1Top = parseFloat(r1.style.top);
           const rowMembers = radios.filter(r2 => Math.abs(parseFloat(r2.style.top) - r1Top) < 1.0);
           
           if (rowMembers.length > 1) {
              const groupName = `radio-group-row-${Math.round(r1Top)}`;
              rowMembers.forEach(r => {
                 r.name = groupName;
                 processed.add(r);
              });
           }
        });

        // 2. Vertical grouping for remaining (Same Column)
        radios.forEach(r1 => {
           if (processed.has(r1)) return;
           const r1Left = parseFloat(r1.style.left);
           const potentialMembers = radios.filter(r2 => Math.abs(parseFloat(r2.style.left) - r1Left) < 1.0);
           const members = potentialMembers.filter(r => !processed.has(r) || r === r1);
           
           if (members.length > 1) {
              const groupName = `radio-group-col-${Math.round(r1Left)}`;
              members.forEach(r => {
                 r.name = groupName;
                 processed.add(r);
              });
           }
        });

        // Append all inputs
        inputs.forEach((input, index) => {
          wrapper.appendChild(input);
          
          // Add navigation logic for digit inputs
          if (input.classList.contains('digit-input')) {
            input.addEventListener('input', (e) => {
              if (input.value.length === 1) {
                // Find next digit input
                // We assume inputs are sorted by DOM order (which matches SVG order usually)
                // We look for the next input in the array that has the class 'digit-input'
                // But we need to be careful about "next" meaning "visually next".
                // Since inputs array is pushed in order of textGroups, which are in SVG order.
                // SVG order for these boxes is left-to-right.
                
                let nextIndex = index + 1;
                while (nextIndex < inputs.length) {
                  if (inputs[nextIndex].classList.contains('digit-input')) {
                    inputs[nextIndex].focus();
                    break;
                  }
                  // If we hit a non-digit input, should we stop? 
                  // The digit boxes are contiguous in the SVG.
                  // But let's just search forward.
                  nextIndex++;
                }
              }
            });

            input.addEventListener('keydown', (e) => {
              if (e.key === 'Backspace' && input.value.length === 0) {
                // Find prev digit input
                let prevIndex = index - 1;
                while (prevIndex >= 0) {
                  if (inputs[prevIndex].classList.contains('digit-input')) {
                    inputs[prevIndex].focus();
                    break;
                  }
                  prevIndex--;
                }
              }
            });
          }
        });

        // Generate Barcode if ISBN is present
        const urlParams = new URLSearchParams(window.location.search);
        const isbn = urlParams.get('isbn');
        
        if (isbn) {
          const barcodeContainer = document.createElement('div');
          barcodeContainer.style.position = 'absolute';
          barcodeContainer.style.top = '40px'; 
          barcodeContainer.style.right = '40px'; 
          barcodeContainer.style.zIndex = '1000';
          // Transparent background, no shadow, no padding to look like print
          barcodeContainer.style.backgroundColor = 'transparent'; 
          barcodeContainer.style.padding = '0';
          barcodeContainer.style.boxShadow = 'none';
          
          // Use canvas tag for barcode
          const barcodeCanvas = document.createElement('canvas');
          barcodeContainer.appendChild(barcodeCanvas);
          wrapper.appendChild(barcodeContainer);

          if (typeof JsBarcode !== 'function') {
             barcodeContainer.innerHTML = '<span style="color:red; font-weight:bold;">JsBarcode library not loaded!</span>';
          } else {
            try {
              JsBarcode(barcodeCanvas, isbn, {
                format: "EAN13",
                lineColor: "#000",
                background: "transparent", // Transparent background for the barcode itself
                width: 2,       // Reduced width back to normal size
                height: 50,     // Reduced height
                displayValue: true,
                fontSize: 14,   // Reduced font size
                font: "monospace",
                margin: 0       // No margin
              });
            } catch (e) {
              console.error("Barcode generation failed:", e);
              barcodeContainer.innerHTML = `<div style="color: red; font-weight: bold;">Barcode Error:<br>${e.message}</div>`;
            }
          }
        }

        // Add Print Button
        const printBtn = document.createElement('button');
        printBtn.textContent = 'Print Form';
        printBtn.className = 'floating-btn btn-print';
        printBtn.onclick = () => {
          window.print();
        };

        // Create a container for controls
        const controls = document.createElement('div');
        controls.style.textAlign = 'center';
        controls.className = 'no-print'; // Hide in print mode
        controls.appendChild(printBtn);
        
        container.appendChild(controls);

        // --- Logic: Defaults -> Storage -> URL -> Listeners ---

        const STORAGE_KEY = 'svg-form-data';
        
        // 1. Define Helpers
        const saveToStorage = () => {
          const data = inputs.map(input => {
            if (input.type === 'radio') return input.checked;
            return input.value;
          });
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        };

        const updateUrlParams = () => {
          const params = new URLSearchParams(window.location.search);
          
          const setOrDelete = (key, input) => {
            if (input && input.value) {
              params.set(key, input.value);
            } else {
              params.delete(key);
            }
          };

          setOrDelete('title', inputs[3]);
          setOrDelete('author', inputs[4]);
          setOrDelete('year', inputs[5]);
          setOrDelete('publisher', inputs[6]);
          setOrDelete('price', inputs[7]);
          
          const queryString = params.toString();
          const newUrl = queryString ? `${window.location.pathname}?${queryString}` : window.location.pathname;
          window.history.replaceState(null, '', newUrl);
        };

        // 2. Set Defaults (Date)
        const today = new Date();
        const yearStr = today.getFullYear().toString();
        const monthStr = (today.getMonth() + 1).toString();
        const dayStr = today.getDate().toString();

        if (inputs[0]) { inputs[0].value = yearStr; inputs[0].style.textAlign = 'right'; }
        if (inputs[1]) { inputs[1].value = monthStr; inputs[1].style.textAlign = 'right'; }
        if (inputs[2]) { inputs[2].value = dayStr; inputs[2].style.textAlign = 'right'; }

        // 3. Load from Storage
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          try {
            const data = JSON.parse(saved);
            data.forEach((val, idx) => {
              if (inputs[idx]) {
                if (inputs[idx].type === 'radio') {
                  inputs[idx].checked = val;
                } else {
                  inputs[idx].value = val;
                }
              }
            });
          } catch (e) {
            console.error('Failed to load storage', e);
          }
        }

        // 4. Apply URL Params (Override)
        // const urlParams = new URLSearchParams(window.location.search); // Already declared above
        const title = urlParams.get('title') || urlParams.get('書名');
        const author = urlParams.get('author') || urlParams.get('著者名');
        const publisher = urlParams.get('publisher') || urlParams.get('出版社');
        const price = urlParams.get('price') || urlParams.get('値段');
        const pubYear = urlParams.get('year') || urlParams.get('出版年');

        if (title && inputs[3]) inputs[3].value = title;
        if (author && inputs[4]) inputs[4].value = author;
        if (pubYear && inputs[5]) inputs[5].value = pubYear;
        if (publisher && inputs[6]) inputs[6].value = publisher;
        if (price && inputs[7]) inputs[7].value = price;

        // 5. Attach Listeners & Trigger Events
        inputs.forEach((input, idx) => {
           // Save to storage on any change
           input.addEventListener('input', saveToStorage);
           input.addEventListener('change', saveToStorage);

           // Update URL for specific fields
           if ([3, 4, 5, 6, 7].includes(idx)) {
             input.addEventListener('input', updateUrlParams);
           }
           
           // Trigger initial events (for auto-size, URL sync, etc.)
           input.dispatchEvent(new Event('input'));
        });

        // Adjust font size for all inputs
        const adjustFontSizes = () => {
          const wrapper = document.querySelector('#editor-container > div');
          if (!wrapper) return;
          const wrapperHeight = wrapper.offsetHeight;
          
          // Digit inputs
          document.querySelectorAll('.digit-input').forEach(input => {
             const hPct = parseFloat(input.dataset.heightPct);
             if (!isNaN(hPct)) {
               const boxHeight = wrapperHeight * (hPct / 100);
               input.style.fontSize = `${boxHeight * 0.8}px`; 
               input.style.lineHeight = `${boxHeight}px`; 
             }
          });

          // Textareas
          document.querySelectorAll('.auto-resize-textarea').forEach(textarea => {
             if (textarea.autoSize) {
                 textarea.autoSize();
             }
          });
        };

        let resizeTimeout;
        window.addEventListener('resize', () => {
          clearTimeout(resizeTimeout);
          resizeTimeout = setTimeout(adjustFontSizes, 100);
        });
        
        // Initial adjustment
        setTimeout(adjustFontSizes, 100);
      }

      // Initialize
      initEditor(document.getElementById('editor-container'));
    </script>
  </body>
</html>
